<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المؤشرات الحيوية</title>
    <style>
      .container {
        display: flex;
        justify-content: center; /* Center horizontally */
        align-items: center; /* Center vertically */
        height: 100vh; /* Take the full height of the viewport */
        background-color: rgb(
          241,
          241,
          241
        ); /* Background color for the page */
      }

      .posimage {
        max-width: 90%; /* Keep image responsive */
        height: auto; /* Maintain aspect ratio */
      }

      header {
        background-color: #0078d4;
        padding: 10px 0;
        display: flex;
        flex-direction: row-reverse;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        font-family: Arial, sans-serif;
        width: 100%;
        top: 0;
        z-index: 1000;
        transition: background-color 0.3s ease;
        direction: rtl; /* لإظهار النص على اليمين */
      }

      .logo img {
        height: 50px;
        margin-right: 20px; /* لتغيير الهامش للأيمن */
      }

      nav ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
      }

      nav ul li {
        margin: 0 15px;
      }

      nav ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 16px;
      }
    </style>
  </head>
  <html>
    <body>
      <header>
        <div class="logo">
          <img src="../logo.png" alt="شعار الموقع" />
        </div>
        <nav>
          <ul>
            <li><a href="./index.html">الرئيسية</a></li>
            <li><a href="./هدفنا.html">هدفنا</a></li>
            <li><a href="#"></a>QR</li>
            <!--بدها تغير  -->
            <li><a href="./الاراء.html">الاراء</a></li>
            <li><a href="./الحيوية.html">المؤشرات الحيوية </a></li>
            <li><a href="./اسئلة شائعة.html">اسئلة شائعة</a></li>
            <li><a href="./الاتصال.html">الأتصال</a></li>
            <li><a href="./الخريطة.html">الخريطة </a></li>
          </ul>
        </nav>
      </header>
      <div class="container">
        <img
          src="../مؤشرات حيوية .jpg"
          alt="المؤشرات الحيوية"
          class="posimage"
        />
      </div>
    </body>
  </html>
</html>
