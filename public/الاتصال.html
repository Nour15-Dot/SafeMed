    <head>

         <title>الاتصال</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center; /* لتوسيط العنصر أفقيًا */
    align-items: center; /* لتوسيط العنصر عموديًا */
    height: 100vh; /* لتحديد ارتفاع الصفحة بالكامل */
    margin: 0;
    background-color: #f4f4f4;
}

header {
        background-color: #0078d4;
        padding: 10px 0;
        display: flex;
        flex-direction: row-reverse;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        transition: background-color 0.3s ease;
        direction: rtl; /* لإظهار النص على اليمين */
      }

      .logo img {
        height: 50px;
        margin-right: 20px; /* لتغيير الهامش للأيمن */
      }

      nav ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
      }

      nav ul li {
        margin: 0 15px;
      }

      nav ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 16px;
      }

.info {
    margin-right: 70px;
    text-align: center;
}

.info p {
    margin: 1px 0;
}

.form {
    max-width: 500px;
    margin-left: 500px;
    margin-top: 150px;
}



.form input, .form textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 10px;
    height: 45px;
}

.form button {
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    height: 60px;
}

.form button:hover {
    background-color: #0056b3;
}
.heading{
    font-size: 60px;
    text-align: center;
    justify-content: center;
    text-decoration: underline rgb(12, 139, 244);
    padding-bottom: 400px;
    display: flex;
    margin-top: 20px;
    height: 100px;
    position: absolute;
}

</style>

    </head>
    <body>
